name: scrape

on:
  schedule:
    # Every 2 hours during IST market hours (UTC+5:30).
    # NSE/BSE open ~09:15 IST (03:45 UTC), close ~15:30 IST (10:00 UTC).
    # Plus a nightly catch-up at 22:00 IST (16:30 UTC) for after-hours filings.
    - cron: "0 4,6,8,10,16 * * 1-5"
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python -m scraper.main
