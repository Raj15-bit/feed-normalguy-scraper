name: scrape

on:
  schedule:
    # Every 2 hours during IST market hours (UTC+5:30) on weekdays.
    # NSE/BSE open ~09:15 IST (03:45 UTC), close ~15:30 IST (10:00 UTC).
    - cron: "0 4,6,8,10 * * 1-5"
    # Nightly catch-up at 22:00 IST (16:30 UTC) EVERY day (incl. weekends) so
    # weekend/after-hours filings are never missed.
    - cron: "0 16 * * *"
  workflow_dispatch:

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install tesseract (OCR fallback for scanned PDFs)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr
      - run: pip install -r requirements.txt
      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python -m scraper.main
