name: doc-classify

# Decide-once / store / read backfill: sets doc_kind / fiscal_year /
# fiscal_quarter / period_source / is_transcript (migration 0014 / seed 0003)
# on existing filings by re-reading the cached PDF body — so the app reads the
# stored columns instead of re-guessing the type + quarter from title + date.
#
# Run order: first with apply_migration=true + company_slug=reliance to verify
# the Reliance documents board, then with full=true to backfill the universe.
#
# Idempotent: deterministic output; rows that already have a doc_kind are skipped
# unless `force` is set.

on:
  workflow_dispatch:
    inputs:
      apply_migration:
        description: "Apply seed 0003 (doc_kind columns) first via psql"
        required: false
        default: false
        type: boolean
      company_slug:
        description: "Backfill just this company (e.g. reliance). Ignored when full=true."
        required: false
        default: "reliance"
        type: string
      full:
        description: "Backfill the WHOLE universe (ignores company_slug)"
        required: false
        default: false
        type: boolean
      force:
        description: "Recompute rows that already have a doc_kind"
        required: false
        default: false
        type: boolean

concurrency:
  group: doc-classify
  cancel-in-progress: false

jobs:
  classify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install psql client
        if: ${{ inputs.apply_migration }}
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Apply migration (seed 0003 — doc_kind columns)
        if: ${{ inputs.apply_migration }}
        env:
          PGCONN: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${PGCONN}" ]; then
            echo "::error::SUPABASE_DB_URL secret is not set."
            exit 1
          fi
          psql "${PGCONN}" -v ON_ERROR_STOP=1 -f seeds/0003_doc_classification.sql
          echo "migration applied."

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Backfill doc_kind + fiscal period
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          set -euo pipefail
          ARGS="--apply"
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          if [ "${{ inputs.full }}" = "true" ]; then
            echo "backfilling the whole universe"
          else
            ARGS="$ARGS --company-slug ${{ inputs.company_slug }}"
            echo "backfilling company=${{ inputs.company_slug }}"
          fi
          python -m scraper.backfill_doc_kind $ARGS
