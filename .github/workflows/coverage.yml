name: coverage

# Every 6 hours: process a ROTATING SLICE (~13 companies) of the Nifty-50,
# detect missing FY2026 transcripts/PPT/credit/annual + 6-month announcements,
# and fill the gaps with targeted idempotent backfills. Small jobs, not one
# giant run — all 50 companies are covered across the day.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      slice:
        description: "Slice spec: auto | i/N | (blank = all)"
        required: false
        default: "auto"

concurrency:
  group: coverage
  cancel-in-progress: false

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install tesseract (OCR fallback)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr
      - run: pip install -r requirements.txt
      - name: Fill coverage gaps (rotating slice)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SCRAPER_MAX_FILINGS_PER_RUN: "400"
        run: |
          SLICE="${{ github.event.inputs.slice }}"
          SLICE="${SLICE:-auto}"
          echo "coverage --apply --slice $SLICE"
          python -m scraper.coverage --apply --slice "$SLICE"
