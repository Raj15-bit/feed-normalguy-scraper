name: fix-dates

# Fast repair pass (no heavy backfill): corrects filings whose posted_at
# collapsed onto the scrape date because NSE's "15-Jul-2025 18:30:00" an_dt
# format was not parsed (defaulted to now()). The true date is re-derived from
# the NSE attachment URL (SYMBOL_DDMMYYYY), then transcripts are re-titled.
# Finishes in a few minutes — use this instead of re-running `transcripts`
# when the rows already exist and only their dates/titles are wrong.

on:
  workflow_dispatch:
  schedule:
    # Daily 03:10 UTC — cheap safety net so new mis-dated rows self-heal.
    - cron: "10 3 * * *"

concurrency:
  group: fix-dates
  cancel-in-progress: false

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - name: Install tesseract (OCR fallback for scanned PDFs)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends tesseract-ocr
      - run: pip install -r requirements.txt
      - name: Repair filing dates (re-derive true date from NSE URL)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python -m scraper.fix_dates --apply
      - name: Re-title hidden transcripts already in the DB
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python -m scraper.retitle_transcripts
